[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# This is a placeholder; alembic will use DATABASE_URL from config.py
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost/rag_db

[post_write_hooks]
# We can format generated migration scripts using Ruff
# hooks = ruff
# ruff.type = console_scripts
# ruff.executable = ruff
# ruff.options = format

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
