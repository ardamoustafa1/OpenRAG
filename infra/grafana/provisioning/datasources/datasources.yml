apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy

  - name: Langfuse DB
    type: postgres
    url: langfuse_postgres:5432
    database: langfuse
    user: langfuse
    secureJsonData:
      password: ${LANGFUSE_DB_PASSWORD}
    jsonData:
      sslmode: disable
    access: proxy
