version: "3.8"

# This file can be used to override the default docker-compose.yml for GPU support.
# Usage: docker compose -f docker-compose.yml -f infra/ollama/docker-compose.override.yml up -d

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      # If falling back to CPU, leave 2 cores free for the host OS
      - OLLAMA_NUM_PARALLEL=4
      # - OLLAMA_MAX_VRAM=24000
