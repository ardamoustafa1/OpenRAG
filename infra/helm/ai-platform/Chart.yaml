apiVersion: v2
name: ai-platform
description: OpenRAG — 100% On-Premise Enterprise RAG AI Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://openrag.com
sources:
  - https://github.com/ardamoustafa1/OpenRAG
keywords:
  - ai
  - rag
  - machine-learning
  - vector-database
  - qdrant
maintainers:
  - name: OpenRAG Team
    email: engineering@openrag.com

dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 18.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: qdrant
    version: 0.7.x
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  - name: minio
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
