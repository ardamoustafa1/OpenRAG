apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-platform.fullname" . }}-config
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
data:
  ENVIRONMENT: "production"
  # Service URLs - Using internal Kubernetes DNS names
  {{- if .Values.qdrant.enabled }}
  QDRANT_HOST: "{{ .Release.Name }}-qdrant"
  QDRANT_PORT: "6333"
  {{- end }}
  {{- if .Values.minio.enabled }}
  MINIO_ENDPOINT: "{{ .Release.Name }}-minio:9000"
  {{- end }}
  # Redis URL pointing to the Bitnami Redis master
  {{- if .Values.redis.enabled }}
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379/0"
  {{- end }}
  # Langfuse LLM Tracing
  LANGFUSE_HOST: "http://{{ .Release.Name }}-langfuse:3000"
  # Frontend CORS
  CORS_ALLOW_ORIGINS: "[\"https://{{ .Values.ingress.hosts.frontend }}\", \"https://{{ .Values.ingress.hosts.tenantWildcard }}\"]"
