apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-platform.fullname" . }}-secret
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  # In a real production environment, this should ideally be managed by External Secrets Operator
  # For the standard chart, we inject them from values or generate them if missing
  SECRET_KEY: {{ randAlphaNum 32 | quote }}
  
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  {{- end }}

  {{- if .Values.minio.enabled }}
  MINIO_ACCESS_KEY: "{{ .Values.minio.auth.rootUser }}"
  MINIO_SECRET_KEY: "{{ .Values.minio.auth.rootPassword | default (randAlphaNum 16) }}"
  {{- end }}
  
  # External dependencies (Stripe, OpenAI fallback, etc.)
  STRIPE_API_KEY: ""
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
