name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          pip install bandit safety pip-audit testcontainers[postgres,redis]
        working-directory: ./backend

      - name: Linting with Ruff
        run: ruff check .
        working-directory: ./backend

      - name: Type checking with Mypy
        run: mypy app/
        working-directory: ./backend

      - name: Unit Tests with Coverage
        run: pytest tests/unit/ -n auto --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80
        working-directory: ./backend

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend-unit
          fail_ci_if_error: false

      - name: Security Scan (Bandit)
        run: bandit -r app/ -ll
        working-directory: ./backend

      - name: Dependency Audit (pip-audit)
        run: pip-audit
        working-directory: ./backend

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Frontend ESLint
        run: npm run lint
        working-directory: ./frontend

      - name: Frontend Type Check
        run: npx tsc --noEmit
        working-directory: ./frontend

      - name: Frontend Unit Tests (Jest)
        run: npm run test -- --ci --passWithNoTests
        working-directory: ./frontend

      - name: Frontend Dependency Audit
        run: npm audit --audit-level=high
        working-directory: ./frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ./frontend
        env:
          # Skip E2E tests if backend not available (CI without full stack)
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image (Dry-run Multi-arch)
        run: docker buildx build --platform linux/amd64,linux/arm64 -t ai-backend:test ./backend

      - name: Scan Backend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ai-backend:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build Frontend Docker Image (Dry-run)
        run: docker build -t ai-frontend:test ./frontend

      - name: Scan Frontend Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ai-frontend:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: ./sdk/python
      - name: Run tests
        run: pytest tests/
        working-directory: ./sdk/python

  test-ts-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./sdk/typescript
      - name: Run tests
        run: npm run test
        working-directory: ./sdk/typescript
      - name: Build SDK
        run: npm run build
        working-directory: ./sdk/typescript

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" testcontainers[postgres,redis]
        working-directory: ./backend
        
      - name: Run Integration Tests
        run: pytest tests/integration/ -v
        working-directory: ./backend

      - name: Start Backend Services
        run: |
          docker compose -f ../docker-compose.yml up -d postgres redis qdrant minio
          sleep 10
          export DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/rag_db
          export REDIS_URL=redis://localhost:6379/0
          export SECRET_KEY=dummy
          export MINIO_SECRET_KEY=dummy
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        working-directory: ./backend

      - name: Run Performance Baseline (Locust)
        run: |
          pip install locust
          locust -f tests/performance/locustfile.py --headless -u 10 -r 2 -t 15s --host=http://localhost:8000
        working-directory: ./backend
