name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint infra/helm/ai-platform

      - name: Deploy to Staging
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm upgrade --install ai-platform infra/helm/ai-platform \
            --namespace staging --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --atomic --timeout 5m

      - name: Run Smoke Tests
        env:
          STAGING_URL: ${{ secrets.STAGING_API_URL }}
        run: |
          echo "Running smoke tests against staging..."
          curl -f "${STAGING_URL}/api/v1/health" || exit 1
          # Verify auth service is up and DB connected (Expects 401 Unauthorized without token)
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/auth/me")
          if [ "$HTTP_STATUS" -ne 401 ]; then
            echo "Smoke test failed: Expected 401 from /auth/me, got $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke tests passed!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    environment:
      name: production
      url: https://openrag.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Deploy to Production
        env:
          KUBECONFIG: ${{ secrets.PROD_KUBECONFIG }}
        run: |
          helm upgrade --install ai-platform infra/helm/ai-platform \
            --namespace production --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set global.environment=production \
            --atomic --timeout 10m
