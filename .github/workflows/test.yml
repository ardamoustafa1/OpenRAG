name: Comprehensive Test Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-xdist
      - name: Run Unit Tests
        run: pytest backend/tests/unit/ -n 4 --cov=backend/app --cov-report=xml

  backend-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio testcontainers
      - name: Run Integration Tests
        run: pytest backend/tests/integration/

  frontend-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./frontend
      - name: Run Playwright Tests
        run: npx playwright test
        working-directory: ./frontend

  rag-evaluation:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' # Only run on cron schedule
    steps:
      - uses: actions/checkout@v3
      - name: Run RAG Evaluation
        run: python backend/tests/rag_evaluation/evaluate_rag.py
