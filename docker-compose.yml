name: openrag

services:
  # ----------------------------------------
  # Reverse Proxy (Traefik)
  # ----------------------------------------
  traefik:
    image: traefik:v3.0
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8080"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard (protected by BasicAuth middleware)
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth@docker"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS:-admin:$$2y$$05$$placeholder}"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------
  # Database (PostgreSQL with pgvector)
  # ----------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis Stack (For Queue, Cache, Vector Search)
  # ----------------------------------------
  redis:
    image: redis/redis-stack-server:7.2.0-v10
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
      - "8001:8001" # RedisInsight
    volumes:
      - redis_data:/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Vector Database (Qdrant)
  # ----------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag_network
    # Healthcheck removed as qdrant image lacks curl/wget

  # ----------------------------------------
  # Object Storage (MinIO)
  # ----------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error MINIO_ROOT_PASSWORD must be set}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Local LLM Engine (Ollama)
  # ----------------------------------------
  ollama:
    image: ollama/ollama:0.1.32
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag_network
    # Uncomment the below block to enable GPU passthrough if available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Observability (Prometheus)
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - prometheus_data:/prometheus
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Observability (Grafana)
  # ----------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
      - "traefik.http.routers.grafana.middlewares=auth@docker"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Log Aggregation (Loki)
  # ----------------------------------------
  loki:
    image: grafana/loki:2.9.2
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Log Forwarder (Promtail)
  # ----------------------------------------
  promtail:
    image: grafana/promtail:2.9.2
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - rag_network
    depends_on:
      - loki

  # ----------------------------------------
  # Tracing & Eval (Langfuse)
  # ----------------------------------------
  langfuse_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:?error LANGFUSE_DB_PASSWORD must be set}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2.55.0
    depends_on:
      langfuse_postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse_postgres:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:?LANGFUSE_NEXTAUTH_SECRET must be set}
      - SALT=${LANGFUSE_SALT:?LANGFUSE_SALT must be set}
      - NEXTAUTH_URL=http://langfuse.localhost
      - TELEMETRY_ENABLED=false
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langfuse.rule=Host(`langfuse.localhost`)"
      - "traefik.http.services.langfuse.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Backend API (FastAPI)
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime  # Use the runtime stage of multi-stage build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  # Override for dev hot-reload
    volumes:
      - ./backend:/app # Hot-reload source code
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?error POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-rag_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?error MINIO_SECRET_KEY must be set}
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_BASE_URL=http://litellm:4000
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - CORS_ALLOW_ORIGINS=["http://localhost:3000","http://localhost:3001"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.localhost`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Celery Worker
  # ----------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?error POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-rag_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?error MINIO_SECRET_KEY must be set}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:?error LANGFUSE_PUBLIC_KEY must be set}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:?error LANGFUSE_SECRET_KEY must be set}
      - LANGFUSE_HOST=http://langfuse:3000
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_BASE_URL=http://litellm:4000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network

  # ----------------------------------------
  # Celery Beat (Scheduled Tasks)
  # ----------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_BASE_URL=http://litellm:4000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - rag_network
      
  # ----------------------------------------
  # Storage
  # ----------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=$${FLOWER_BASIC_AUTH:-admin:admin}
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.localhost`)"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"

  # ----------------------------------------
  # vLLM Serving Engine
  # ----------------------------------------
  vllm:
    profiles:
      - gpu
    build:
      context: ./infra/vllm
      dockerfile: Dockerfile
    # GPU pass-through is mandatory for vLLM performance
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - vllm_data:/root/.cache/huggingface
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ----------------------------------------
  # LiteLLM Orchestration Proxy
  # ----------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.35.0
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "8" ]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:?error LANGFUSE_PUBLIC_KEY must be set}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:?error LANGFUSE_SECRET_KEY must be set}
      - LANGFUSE_HOST=http://langfuse:3000
    depends_on:
      - redis
      - ollama
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`litellm.localhost`)"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"

  # ----------------------------------------
  # Frontend UI (Next.js)
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api.localhost
    networks:
      - rag_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

networks:
  rag_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:
  vllm_data:
  prometheus_data:
  grafana_data:
  loki_data:
  langfuse_db_data:
